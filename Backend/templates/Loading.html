{% extends 'father.html' %}

{% block content %}
<style>
    .loading-card {
        background: #212529;
        border-radius: 1.25rem;
        padding: 3rem 2.5rem;
        width: min(480px, 92vw);
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        border: 1px solid #3a3f47;
    }
    .loading-model {
        font-family: "Cascadia Code", "Consolas", monospace;
        color: #0d6efd;
        font-size: 0.95rem;
        margin-bottom: 1.25rem;
        letter-spacing: 0.02em;
    }
    .loading-status {
        color: #adb5bd;
        font-size: 0.92rem;
        min-height: 1.4em;
        margin-bottom: 1.5rem;
    }
    .loading-bar {
        margin-top: 1.5rem;
        height: 6px;
        background: #2c3e50;
        border-radius: 3px;
        overflow: hidden;
        position: relative;
    }
    .loading-bar::after {
        content: "";
        position: absolute;
        left: -40%;
        width: 40%;
        height: 100%;
        background: #0d6efd;
        border-radius: 3px;
        animation: loadingSlide 1.4s ease-in-out infinite;
    }
    @keyframes loadingSlide {
        0%   { left: -40%; }
        100% { left: 100%; }
    }
    .loading-error {
        color: #ff6b6b;
    }
    .loading-error-detail {
        margin-top: 1rem;
        font-family: monospace;
        font-size: 0.78rem;
        color: #78909c;
        word-break: break-word;
    }
    .loading-spinner {
        width: 56px;
        height: 56px;
        margin: 0 auto 1.75rem;
        border: 4px solid #2c3e50;
        border-top-color: #0d6efd;
        border-radius: 50%;
        animation: loadingSpin 0.9s linear infinite;
    }
    @keyframes loadingSpin { to { transform: rotate(360deg); } }
    .loading-title {
        font-size: 1.3rem;
        font-weight: 600;
        color: #f1f3f5;
        margin-bottom: 0.5rem;
    }
    .loading-eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.72rem;
        color: #6c757d;
        margin-bottom: 0.4rem;
    }
</style>

<div class="min-vh-100 d-flex justify-content-center align-items-center">
    <div class="loading-card">
        <div class="loading-spinner" id="spinner"></div>
        <div class="loading-eyebrow">VivoDPI</div>
        <h1 class="loading-title" id="title">Preparing the analysis engine</h1>
        <div class="loading-model" id="modelName">{{ model }}</div>
        <div class="loading-status" id="status">Starting…</div>
        <div class="loading-bar" id="bar"></div>
        <div class="loading-error-detail" id="errorDetail"></div>
    </div>
</div>

<script>
    const statusEl = document.getElementById("status");
    const titleEl = document.getElementById("title");
    const spinnerEl = document.getElementById("spinner");
    const barEl = document.getElementById("bar");
    const errorDetailEl = document.getElementById("errorDetail");

    async function poll() {
        try {
            const res = await fetch("/models/status", { cache: "no-store" });
            const data = await res.json();

            if (data.state === "ready") {
                statusEl.textContent = "Ready. Redirecting…";
                setTimeout(() => { window.location.href = "/workspace"; }, 400);
                return;
            }

            if (data.state === "error") {
                titleEl.textContent = "Could not load the model";
                titleEl.classList.add("loading-error");
                statusEl.textContent = "Check that Ollama is running and the model is downloaded.";
                spinnerEl.style.display = "none";
                barEl.style.display = "none";
                errorDetailEl.textContent = data.message || "";
                return;
            }

            statusEl.textContent = data.message || "Loading model into memory…";
            setTimeout(poll, 1000);

        } catch (e) {
            statusEl.textContent = "Connecting to the server…";
            setTimeout(poll, 1000);
        }
    }

    poll();
</script>
{% endblock %}
